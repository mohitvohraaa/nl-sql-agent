apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mohitvohra/nl-sql-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GROQ_API_KEY
            - name: BIGQUERY_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: BIGQUERY_PROJECT_ID
            - name: BIGQUERY_DATASET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: BIGQUERY_DATASET
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /tmp/keys/adc.json
          volumeMounts:
            - name: gcp-credentials
              mountPath: /tmp/keys
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: gcp-credentials
          secret:
            secretName: gcp-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
