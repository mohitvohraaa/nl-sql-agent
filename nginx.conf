server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React app — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward /chat and /health to the backend container
    # In Docker Compose: backend resolves by service name
    # In K8s: backend-service resolves via DNS
    location /chat {
        proxy_pass http://backend:8080/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://backend:8080/health;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}