stages:
  - build
  - push
  - deploy

variables:
  BACKEND_IMAGE:  "mohitvohra/nl-sql-backend"
  FRONTEND_IMAGE: "mohitvohra/nl-sql-frontend"
  DOCKER_DRIVER:  overlay2
  DOCKER_TLS_CERTDIR: "/certs"

build_backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
  script:
    - docker build --platform linux/amd64 -f Dockerfile.backend -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" .
    - docker save "$BACKEND_IMAGE:$CI_COMMIT_SHA" > backend.tar
  artifacts:
    paths:
      - backend.tar
    expire_in: 1 hour
  only:
    - main

build_frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
  script:
    - docker build --platform linux/amd64 -f Dockerfile.frontend -t "$FRONTEND_IMAGE:$CI_COMMIT_SHA" .
    - docker save "$FRONTEND_IMAGE:$CI_COMMIT_SHA" > frontend.tar
  artifacts:
    paths:
      - frontend.tar
    expire_in: 1 hour
  only:
    - main

push_backend:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
  script:
    - docker load < backend.tar
    - docker tag "$BACKEND_IMAGE:$CI_COMMIT_SHA" "$BACKEND_IMAGE:latest"
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$BACKEND_IMAGE:latest"
  dependencies:
    - build_backend
  only:
    - main

push_frontend:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
  script:
    - docker load < frontend.tar
    - docker tag "$FRONTEND_IMAGE:$CI_COMMIT_SHA" "$FRONTEND_IMAGE:latest"
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$FRONTEND_IMAGE:latest"
  dependencies:
    - build_frontend
  only:
    - main

deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  before_script:
    - echo "$GCP_SA_KEY" | base64 -d > /tmp/sa-key.json
    - gcloud auth activate-service-account --key-file=/tmp/sa-key.json
    - gcloud config set project "$GCP_PROJECT_ID"
    - gcloud components install kubectl --quiet
    - gcloud components install gke-gcloud-auth-plugin --quiet
    - gcloud container clusters get-credentials "$GKE_CLUSTER_NAME" --zone "$GKE_CLUSTER_ZONE" --project "$GCP_PROJECT_ID"
  script:
    # Update images
    - kubectl set image deployment/backend backend="$BACKEND_IMAGE:$CI_COMMIT_SHA"
    - kubectl set image deployment/frontend frontend="$FRONTEND_IMAGE:$CI_COMMIT_SHA"

    # Scale down to 0 first — frees resources on e2-small
    - kubectl scale deployment/backend --replicas=0
    - kubectl scale deployment/frontend --replicas=0

    # Wait for pods to terminate
    - sleep 15

    # Scale back up with new image
    - kubectl scale deployment/backend --replicas=1
    - kubectl scale deployment/frontend --replicas=1

    # Wait for new pods to be ready
    - kubectl rollout status deployment/backend --timeout=600s
    - kubectl rollout status deployment/frontend --timeout=600s

    # Show final state
    - kubectl get pods
    - kubectl get ingress
  environment:
    name: production
  only:
    - main
